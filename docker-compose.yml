services:
  postgres:
    image: postgres:16-alpine
    container_name: tonalli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tonalli
      POSTGRES_USER: tonalli
      POSTGRES_PASSWORD: tonalli_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tonalli"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tonalli-network

  redis:
    image: redis:7-alpine
    container_name: tonalli-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tonalli-network

  minio:
    image: minio/minio:latest
    container_name: tonalli-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tonalli_minio
      MINIO_ROOT_PASSWORD: tonalli_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - tonalli-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  tonalli-network:
    driver: bridge
