    listen 443 ssl http2;
    server_name admin.tonalli.app;

    ssl_certificate /etc/letsencrypt/live/tonalli.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tonalli.app/privkey.pem;
